name: go-nbd

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        toolchain: [oldstable, stable]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ matrix.toolchain }}
    - name: Build
      run: go build ./...
  lint:
    strategy:
      matrix:
        toolchain: [oldstable, stable]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ matrix.toolchain }}
    - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        version: v2.9
  test:
    strategy:
      matrix:
        toolchain: [oldstable, stable]
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ matrix.toolchain }}
    - name: Install nbdkit
      run: sudo apt-get install nbdkit
    - name: Test
      run: go test -timeout 1m -v ./...

